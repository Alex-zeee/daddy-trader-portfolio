{"name":"Auto Signals","on":{"schedule":[{"cron":"*/15 * * * *"}],"workflow_dispatch":{}},"permissions":{"contents":"write"},"jobs":{"signals":{"runs-on":"ubuntu-latest","env":{"TD_KEY":"${{ secrets.TD_KEY }}"},"steps":[{"uses":"actions/checkout@v4"},{"uses":"actions/setup-python@v5","with":{"python-version":"3.11"}},{"run":"pip install yfinance"},{"run":"python signals.py"},{"run":"python monitor.py || true"},{"run":"if [ -f .new_signal ]; then curl -s -H 'Title: Daddy Trader Signal' -d \"$(cat .new_signal)\" https://ntfy.sh/daddytrader-ali-signals; rm -f .new_signal; fi"},{"run":"if [ -f .new_news ]; then curl -s -H 'Title: Daddy Trader - Gold News' -d \"$(cat .new_news)\" https://ntfy.sh/daddytrader-ali-news; rm -f .new_news; fi"},{"run":"git config user.name signal-bot && git config user.email signal-bot@users.noreply.github.com && git add signals.json monitor.json && (git diff --cached --quiet || git commit -m auto-signals) && git push"}]}}}
